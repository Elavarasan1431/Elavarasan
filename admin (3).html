<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Trend Vibes Admin</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow+Condensed:wght@700;800&family=Barlow:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Barlow',sans-serif;background:#f0faf4;color:#1a2e1f}
#loginPage{min-height:100vh;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,#f0faf4,#fce4ed)}
.lbox{background:#fff;border-radius:20px;padding:48px 40px;width:360px;border:2px solid #b8e8cc}
.lbox h1{font-family:'Bebas Neue',sans-serif;font-size:2.2rem;letter-spacing:.1em;text-align:center;margin-bottom:4px;color:#145a32}
.lbox h1 span{color:#e0648a}
.lbox p{text-align:center;font-size:.8rem;color:#6b8f76;letter-spacing:.15em;text-transform:uppercase;margin-bottom:32px}
.lbox label{display:block;font-family:'Barlow Condensed',sans-serif;font-size:.8rem;font-weight:800;letter-spacing:.12em;text-transform:uppercase;color:#1e8449;margin-bottom:8px}
.lbox input{width:100%;padding:14px 16px;border:2px solid #b8e8cc;border-radius:10px;font-size:1rem;outline:none;font-family:'Barlow',sans-serif;color:#1a2e1f;margin-bottom:20px}
.lbox input:focus{border-color:#1e8449}
.lbox button{width:100%;padding:15px;border:none;border-radius:10px;background:linear-gradient(135deg,#1e8449,#e0648a);color:#fff;font-family:'Barlow Condensed',sans-serif;font-size:1.1rem;font-weight:800;letter-spacing:.15em;text-transform:uppercase;cursor:pointer}
#lerr{background:#fce4ed;color:#a93060;border-radius:8px;padding:10px;text-align:center;font-size:.85rem;margin-bottom:16px;display:none}
#adminPage{display:none}
.topbar{background:linear-gradient(90deg,#145a32,#1e8449);color:#fff;padding:16px 28px;display:flex;align-items:center;justify-content:space-between}
.topbar h2{font-family:'Bebas Neue',sans-serif;font-size:1.8rem;letter-spacing:.1em}
.topbar h2 span{color:#f093b0}
.tbtn{padding:8px 18px;border-radius:8px;font-family:'Barlow Condensed',sans-serif;font-size:.85rem;font-weight:800;letter-spacing:.1em;text-transform:uppercase;cursor:pointer;text-decoration:none;border:none;margin-left:8px}
.tbtn-view{background:rgba(255,255,255,.2);color:#fff}
.tbtn-out{background:#e0648a;color:#fff}
.tabs{background:#fff;border-bottom:2px solid #b8e8cc;display:flex;padding:0 28px;gap:4px;overflow-x:auto}
.tab{padding:14px 20px;font-family:'Barlow Condensed',sans-serif;font-size:.88rem;font-weight:800;letter-spacing:.08em;text-transform:uppercase;cursor:pointer;color:#6b8f76;border-bottom:3px solid transparent;margin-bottom:-2px;white-space:nowrap}
.tab.on{color:#1e8449;border-bottom-color:#1e8449}
.wrap{padding:24px;max-width:1100px}
.pnl{display:none}
.pnl.on{display:block}
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:24px}
.stat{background:#fff;border:2px solid #b8e8cc;border-radius:14px;padding:18px;text-align:center}
.snum{font-family:'Bebas Neue',sans-serif;font-size:2.5rem;color:#1e8449}
.slbl{font-family:'Barlow Condensed',sans-serif;font-size:.72rem;font-weight:800;letter-spacing:.1em;text-transform:uppercase;color:#6b8f76;margin-top:4px}
.card{background:#fff;border:2px solid #b8e8cc;border-radius:14px;overflow:hidden;margin-bottom:20px}
.ch{padding:14px 18px;border-bottom:2px solid #b8e8cc;display:flex;justify-content:space-between;align-items:center}
.ch h3{font-family:'Bebas Neue',sans-serif;font-size:1.3rem;letter-spacing:.06em}
table{width:100%;border-collapse:collapse}
th{background:#f0faf4;padding:11px 14px;text-align:left;font-family:'Barlow Condensed',sans-serif;font-size:.72rem;font-weight:800;letter-spacing:.12em;text-transform:uppercase;color:#6b8f76;border-bottom:2px solid #b8e8cc}
td{padding:13px 14px;border-bottom:1px solid #d5f0e0;font-size:.87rem}
tr:last-child td{border-bottom:none}
tr:hover td{background:#f0faf4}
.bdg{display:inline-block;padding:3px 10px;border-radius:50px;font-family:'Barlow Condensed',sans-serif;font-size:.68rem;font-weight:800;letter-spacing:.08em;text-transform:uppercase}
.bn{background:#1e8449;color:#fff}.bs{background:#e0648a;color:#fff}.bh{background:#f093b0;color:#fff}.bx{background:#d5f0e0;color:#1e8449}
.bsm{padding:6px 12px;border:none;border-radius:6px;font-family:'Barlow Condensed',sans-serif;font-size:.75rem;font-weight:800;letter-spacing:.08em;text-transform:uppercase;cursor:pointer;margin-right:4px}
.be{background:#d5f0e0;color:#145a32}.bd{background:#fce4ed;color:#a93060}
.fg{display:grid;grid-template-columns:1fr 1fr;gap:14px;padding:18px}
.fld{display:flex;flex-direction:column;gap:6px}
.fld.full{grid-column:span 2}
.fld label{font-family:'Barlow Condensed',sans-serif;font-size:.75rem;font-weight:800;letter-spacing:.1em;text-transform:uppercase;color:#1e8449}
.fld input,.fld select{padding:11px 13px;border:2px solid #b8e8cc;border-radius:10px;font-family:'Barlow',sans-serif;font-size:.88rem;color:#1a2e1f;outline:none;background:#f8fdfb}
.fld input:focus,.fld select:focus{border-color:#1e8449;background:#fff}
.fa{padding:0 18px 18px;display:flex;gap:10px}
.bsave{background:linear-gradient(135deg,#1e8449,#e0648a);color:#fff;border:none;border-radius:10px;padding:12px 28px;font-family:'Barlow Condensed',sans-serif;font-size:.95rem;font-weight:800;letter-spacing:.12em;text-transform:uppercase;cursor:pointer}
.bcan{background:#f0faf4;color:#3a5a44;border:2px solid #b8e8cc;border-radius:10px;padding:10px 22px;font-family:'Barlow Condensed',sans-serif;font-size:.9rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;cursor:pointer}
.er{display:flex;flex-wrap:wrap;gap:7px}
.ep{width:36px;height:36px;border-radius:8px;border:2px solid #b8e8cc;background:#fff;display:flex;align-items:center;justify-content:center;font-size:1.1rem;cursor:pointer}
.ep.on{border-color:#1e8449;background:#d5f0e0}
.sg{display:grid;grid-template-columns:1fr 1fr;gap:18px}
.sc{background:#fff;border:2px solid #b8e8cc;border-radius:14px;padding:22px}
.sc h3{font-family:'Bebas Neue',sans-serif;font-size:1.2rem;letter-spacing:.06em;margin-bottom:14px;color:#145a32}
.pc{background:#fff;border:2px solid #b8e8cc;border-radius:14px;padding:24px;max-width:400px}
.pc h3{font-family:'Bebas Neue',sans-serif;font-size:1.2rem;letter-spacing:.06em;margin-bottom:18px;color:#145a32}
#toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(100px);background:#145a32;color:#fff;border-radius:50px;padding:11px 26px;font-family:'Barlow Condensed',sans-serif;font-size:.9rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;z-index:9999;white-space:nowrap;transition:transform .35s ease}
#toast.on{transform:translateX(-50%) translateY(0)}
@media(max-width:600px){.stats{grid-template-columns:1fr 1fr}.fg{grid-template-columns:1fr}.fld.full{grid-column:span 1}.sg{grid-template-columns:1fr}}
</style>
</head>
<body>

<div id="loginPage">
  <div class="lbox">
    <h1>Trend<span>Vibes</span></h1>
    <p>Admin Panel</p>
    <div id="lerr">Wrong password. Try again!</div>
    <label>Password</label>
    <input type="password" id="pwin" placeholder="Enter admin password">
    <button id="lbtn">Login to Admin</button>
  </div>
</div>

<div id="adminPage">
  <div class="topbar">
    <h2>Trend<span>Vibes</span></h2>
    <div>
      <a class="tbtn tbtn-view" href="index.html" target="_blank">View Store</a>
      <button class="tbtn tbtn-out" id="loutbtn">Logout</button>
    </div>
  </div>
  <div class="tabs">
    <div class="tab on" id="t0">Dashboard</div>
    <div class="tab" id="t1">Products</div>
    <div class="tab" id="t2">Add Product</div>
    <div class="tab" id="t3">Settings</div>
    <div class="tab" id="t4">Password</div>
  </div>
  <div class="wrap">

    <div class="pnl on" id="p0">
      <div class="stats">
        <div class="stat"><div class="snum" id="d0">0</div><div class="slbl">Total</div></div>
        <div class="stat"><div class="snum" id="d1">0</div><div class="slbl">Sarees</div></div>
        <div class="stat"><div class="snum" id="d2">0</div><div class="slbl">Tops</div></div>
        <div class="stat"><div class="snum" id="d3">0</div><div class="slbl">Skirts</div></div>
      </div>
      <div class="card">
        <div class="ch"><h3>Quick Actions</h3></div>
        <div style="padding:18px;display:flex;gap:10px;flex-wrap:wrap">
          <button class="bsave" id="qa1">Add Product</button>
          <button class="bsave" style="background:linear-gradient(135deg,#e0648a,#f093b0)" id="qa2">Manage Products</button>
        </div>
      </div>
    </div>

    <div class="pnl" id="p1">
      <div class="card">
        <div class="ch"><h3>All Products</h3><button class="bsave" style="padding:7px 16px;font-size:.82rem" id="qa3">Add New</button></div>
        <table><thead><tr><th>Icon</th><th>Name</th><th>Category</th><th>Price</th><th>Old Price</th><th>Badge</th><th>Actions</th></tr></thead>
        <tbody id="ptbl"></tbody></table>
      </div>
    </div>

    <div class="pnl" id="p2">
      <div class="card">
        <div class="ch"><h3 id="fh">Add Product</h3></div>
        <input type="hidden" id="fid">
        <div class="fg">
          <div class="fld"><label>Product Name</label><input id="fn" placeholder="e.g. Kanjivaram Silk"></div>
          <div class="fld"><label>Description</label><input id="fd" placeholder="e.g. Traditional Silk Saree"></div>
          <div class="fld"><label>Price (Rs.)</label><input type="number" id="fp" placeholder="2499"></div>
          <div class="fld"><label>Old Price (Rs.) optional</label><input type="number" id="fo" placeholder="Leave blank"></div>
          <div class="fld"><label>Category</label>
            <select id="fc"><option value="saree">Saree</option><option value="top">Top</option><option value="skirts">Skirts</option><option value="tshirts">T-Shirts</option></select>
          </div>
          <div class="fld"><label>Badge</label>
            <select id="fb"><option value="">None</option><option value="new">New In</option><option value="sale">Sale</option><option value="hot">Hot</option></select>
          </div>
          <div class="fld"><label>Stars</label>
            <select id="fst"><option value="5">5 Stars</option><option value="4">4 Stars</option><option value="3">3 Stars</option></select>
          </div>
          <div class="fld full"><label>Icon</label><div class="er" id="er"></div></div>
        </div>
        <div class="fa">
          <button class="bsave" id="fsave">Save Product</button>
          <button class="bcan" id="fcan">Cancel</button>
        </div>
      </div>
    </div>

    <div class="pnl" id="p3">
      <div class="sg">
        <div class="sc"><h3>Store Info</h3>
          <div class="fld" style="margin-bottom:12px"><label>Store Name</label><input value="Trend Vibes"></div>
          <div class="fld" style="margin-bottom:12px"><label>Tagline</label><input value="Fashion Store"></div>
          <div class="fld" style="margin-bottom:18px"><label>Website</label><input value="www.trendvibes.com"></div>
          <button class="bsave" id="s1">Save</button>
        </div>
        <div class="sc"><h3>Payment Info</h3>
          <div class="fld" style="margin-bottom:12px"><label>UPI ID</label><input value="methalelavarasan-1@okaxis"></div>
          <div class="fld" style="margin-bottom:12px"><label>Free Shipping Above (Rs.)</label><input type="number" value="1999"></div>
          <div class="fld" style="margin-bottom:18px"><label>Delivery Days</label><input type="number" value="5"></div>
          <button class="bsave" id="s2">Save</button>
        </div>
      </div>
    </div>

    <div class="pnl" id="p4">
      <div class="pc"><h3>Change Password</h3>
        <div class="fld" style="margin-bottom:12px"><label>Current Password</label><input type="password" id="pc1" placeholder="Current password"></div>
        <div class="fld" style="margin-bottom:12px"><label>New Password</label><input type="password" id="pc2" placeholder="New password"></div>
        <div class="fld" style="margin-bottom:18px"><label>Confirm Password</label><input type="password" id="pc3" placeholder="Confirm password"></div>
        <button class="bsave" id="pcbtn">Update Password</button>
      </div>
    </div>

  </div>
</div>

<div id="toast"></div>

<script>
var PW = "admin123";
var prods = [
  {id:1,name:"Kanjivaram Silk",desc:"Traditional Silk Saree",cat:"saree",price:2499,old:0,em:"🥻",badge:"new",stars:5},
  {id:2,name:"Banarasi Weave",desc:"Handwoven Banarasi Saree",cat:"saree",price:3299,old:0,em:"🥻",badge:"hot",stars:5},
  {id:3,name:"Floral Crop Top",desc:"Casual Summer Top",cat:"top",price:499,old:0,em:"👘",badge:"new",stars:4},
  {id:4,name:"Embroidered Top",desc:"Elegant Party Wear Top",cat:"top",price:799,old:1099,em:"✨",badge:"sale",stars:5},
  {id:5,name:"Pleated Midi Skirt",desc:"Flowy Everyday Skirt",cat:"skirts",price:649,old:0,em:"👗",badge:"new",stars:5},
  {id:6,name:"Printed Mini Skirt",desc:"Trendy Mini Skirt",cat:"skirts",price:549,old:799,em:"🌸",badge:"sale",stars:4},
  {id:7,name:"Classic White Tee",desc:"Everyday Cotton T-Shirt",cat:"tshirts",price:299,old:0,em:"👚",badge:"hot",stars:5},
  {id:8,name:"Graphic Printed Tee",desc:"Casual Graphic T-Shirt",cat:"tshirts",price:399,old:0,em:"🌼",badge:"new",stars:4}
];
var EMS = ["🥻","👗","👘","🩱","👚","✨","🌸","🌼","🧶","💎","🌺","🎀","👙","🩳","🧥","👒","👜","🎽"];
var selEm = "👗";

// LOGIN
document.getElementById("lbtn").onclick = login;
document.getElementById("pwin").onkeyup = function(e){ if(e.key==="Enter") login(); };
function login(){
  var v = document.getElementById("pwin").value.trim();
  if(v === PW){
    document.getElementById("loginPage").style.display = "none";
    document.getElementById("adminPage").style.display = "block";
    upDash(); renderTbl(); buildEm();
  } else {
    document.getElementById("lerr").style.display = "block";
    document.getElementById("pwin").value = "";
    document.getElementById("pwin").focus();
  }
}
document.getElementById("loutbtn").onclick = function(){
  document.getElementById("adminPage").style.display = "none";
  document.getElementById("loginPage").style.display = "flex";
  document.getElementById("pwin").value = "";
};

// TABS
function goTab(n){
  for(var i=0;i<5;i++){
    document.getElementById("p"+i).className = "pnl" + (i===n?" on":"");
    document.getElementById("t"+i).className = "tab" + (i===n?" on":"");
  }
  if(n===0) upDash();
  if(n===1) renderTbl();
  if(n===2) resetForm();
}
for(var i=0;i<5;i++){
  (function(n){ document.getElementById("t"+n).onclick = function(){ goTab(n); }; })(i);
}
document.getElementById("qa1").onclick = function(){ goTab(2); };
document.getElementById("qa2").onclick = function(){ goTab(1); };
document.getElementById("qa3").onclick = function(){ goTab(2); };

// DASHBOARD
function upDash(){
  document.getElementById("d0").textContent = prods.length;
  document.getElementById("d1").textContent = prods.filter(function(p){return p.cat==="saree";}).length;
  document.getElementById("d2").textContent = prods.filter(function(p){return p.cat==="top"||p.cat==="tshirts";}).length;
  document.getElementById("d3").textContent = prods.filter(function(p){return p.cat==="skirts";}).length;
}

// TABLE
function renderTbl(){
  var cats = {saree:"Saree",top:"Top",skirts:"Skirts",tshirts:"T-Shirts"};
  var h = "";
  for(var i=0;i<prods.length;i++){
    var p = prods[i];
    var bc = p.badge==="new"?"bn":p.badge==="sale"?"bs":p.badge==="hot"?"bh":"bx";
    h += "<tr><td style='font-size:1.4rem'>"+p.em+"</td>";
    h += "<td><strong>"+p.name+"</strong><br><small style='color:#6b8f76'>"+p.desc+"</small></td>";
    h += "<td>"+(cats[p.cat]||p.cat)+"</td>";
    h += "<td style='color:#1e8449;font-weight:700'>Rs."+p.price+"</td>";
    h += "<td style='color:#aaa;text-decoration:line-through'>"+(p.old>0?"Rs."+p.old:"—")+"</td>";
    h += "<td><span class='bdg "+bc+"'>"+(p.badge||"none")+"</span></td>";
    h += "<td><button class='bsm be' data-eid='"+p.id+"'>Edit</button><button class='bsm bd' data-did='"+p.id+"'>Delete</button></td></tr>";
  }
  document.getElementById("ptbl").innerHTML = h;
  document.querySelectorAll("[data-eid]").forEach(function(b){
    b.onclick = function(){ editP(parseInt(this.getAttribute("data-eid"))); };
  });
  document.querySelectorAll("[data-did]").forEach(function(b){
    b.onclick = function(){ delP(parseInt(this.getAttribute("data-did"))); };
  });
}

// EMOJIS
function buildEm(){
  var h = "";
  for(var i=0;i<EMS.length;i++){
    h += "<div class='ep"+(EMS[i]===selEm?" on":"")+"' data-em='"+EMS[i]+"'>"+EMS[i]+"</div>";
  }
  document.getElementById("er").innerHTML = h;
  document.querySelectorAll("[data-em]").forEach(function(el){
    el.onclick = function(){ selEm = this.getAttribute("data-em"); buildEm(); };
  });
}

// FORM
function resetForm(){
  document.getElementById("fh").textContent = "Add Product";
  document.getElementById("fid").value = "";
  document.getElementById("fn").value = "";
  document.getElementById("fd").value = "";
  document.getElementById("fp").value = "";
  document.getElementById("fo").value = "";
  document.getElementById("fc").value = "saree";
  document.getElementById("fb").value = "";
  document.getElementById("fst").value = "5";
  selEm = "👗";
  buildEm();
}
function editP(id){
  var p = null;
  for(var i=0;i<prods.length;i++){ if(prods[i].id===id){ p=prods[i]; break; } }
  if(!p) return;
  goTab(2);
  document.getElementById("fh").textContent = "Edit Product";
  document.getElementById("fid").value = p.id;
  document.getElementById("fn").value = p.name;
  document.getElementById("fd").value = p.desc;
  document.getElementById("fp").value = p.price;
  document.getElementById("fo").value = p.old>0?p.old:"";
  document.getElementById("fc").value = p.cat;
  document.getElementById("fb").value = p.badge||"";
  document.getElementById("fst").value = p.stars;
  selEm = p.em;
  buildEm();
}
document.getElementById("fsave").onclick = function(){
  var name  = document.getElementById("fn").value.trim();
  var desc  = document.getElementById("fd").value.trim();
  var price = parseFloat(document.getElementById("fp").value);
  var old   = parseFloat(document.getElementById("fo").value)||0;
  var cat   = document.getElementById("fc").value;
  var badge = document.getElementById("fb").value;
  var stars = parseInt(document.getElementById("fst").value);
  var fid   = document.getElementById("fid").value;
  if(!name||!desc||isNaN(price)){ toast("Fill Name, Description and Price!"); return; }
  if(fid){
    for(var i=0;i<prods.length;i++){
      if(prods[i].id==fid){ prods[i]={id:prods[i].id,name:name,desc:desc,cat:cat,price:price,old:old,em:selEm,badge:badge,stars:stars}; break; }
    }
    toast("Product updated!");
  } else {
    prods.push({id:Date.now(),name:name,desc:desc,cat:cat,price:price,old:old,em:selEm,badge:badge,stars:stars});
    toast("Product added!");
  }
  upDash(); goTab(1);
};
document.getElementById("fcan").onclick = function(){ goTab(1); };

// DELETE
function delP(id){
  if(!confirm("Delete this product?")) return;
  prods = prods.filter(function(p){ return p.id!==id; });
  renderTbl(); upDash(); toast("Product deleted!");
}

// SETTINGS
document.getElementById("s1").onclick = function(){ toast("Store info saved!"); };
document.getElementById("s2").onclick = function(){ toast("Payment info saved!"); };

// PASSWORD
document.getElementById("pcbtn").onclick = function(){
  var cur = document.getElementById("pc1").value.trim();
  var nw  = document.getElementById("pc2").value.trim();
  var con = document.getElementById("pc3").value.trim();
  if(cur!==PW){ toast("Current password is wrong!"); return; }
  if(nw.length<4){ toast("Password too short!"); return; }
  if(nw!==con){ toast("Passwords do not match!"); return; }
  PW=nw;
  document.getElementById("pc1").value="";
  document.getElementById("pc2").value="";
  document.getElementById("pc3").value="";
  toast("Password changed successfully!");
};

// TOAST
function toast(msg){
  var t = document.getElementById("toast");
  t.textContent = msg;
  t.className = "on";
  setTimeout(function(){ t.className = ""; }, 2800);
}
</script>
</body>
</html>
